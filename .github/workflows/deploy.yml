name: Backend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted # 방금 만든 Bastion 러너 사용
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Node.js 환경 세팅
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # pnpm 설치 및 경로 설정
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: false
      - name: Deploy to API Server
        run: |
          echo "${{ secrets.BASTION_SSH_KEY }}" > api-key.pem
          chmod 400 api-key.pem

          # 1. 빌드 및 전송
          pnpm install && pnpm run build
          # --delete 옵션을 추가하여 불필요한 옛날 파일을 정리합니다.
          rsync -avz -e "ssh -i api-key.pem -o StrictHostKeyChecking=no" \
            --delete --exclude '.git' \
            ./dist ./package.json ./node_modules \
            ec2-user@10.0.136.140:/var/www/api/

          # 2. API 서버에서 서버 기동
          ssh -i api-key.pem -o StrictHostKeyChecking=no ec2-user@10.0.136.140 "
            cd /var/www/api &&
            # pm2가 프로세스를 못 찾으면(delete) 새로 시작(start)하도록 구성
            node /home/ec2-user/pm2-bundle/bin/pm2 delete api-server || true &&
            node /home/ec2-user/pm2-bundle/bin/pm2 start /var/www/api/dist/main.js --name 'api-server'
          "

          rm -f api-key.pem
