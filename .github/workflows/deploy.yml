name: Backend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted # 방금 만든 Bastion 러너 사용
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Node.js 환경 세팅
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # pnpm 설치 및 경로 설정
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: false
      - name: Build and Sync to API Server
        run: |
          echo "${{ secrets.BASTION_SSH_KEY }}" > api-key.pem
          chmod 400 api-key.pem

          # 1. 빌드 수행 (환경 변수를 사용해 질문 차단)
          pnpm config set only-allow-authenticated-updates false
          # --no-frozen-lockfile로 lock파일 무시하고 강제 설치
          pnpm install --no-frozen-lockfile

          # pnpm v10에서 질문 없이 모든 빌드 스크립트 실행 허용
          pnpm approve-builds --filter "*" || true 

          pnpm run build

          # 2. 정확히 필요한 폴더만 압축
          zip -rq deploy_package.zip dist package.json node_modules

          # 3. 전송
          scp -i api-key.pem -o StrictHostKeyChecking=no deploy_package.zip ec2-user@10.0.136.140:/home/ec2-user/

          # 4. API 서버에서 압축 해제 및 실행
          ssh -i api-key.pem -o StrictHostKeyChecking=no ec2-user@10.0.136.140 "
            sudo rm -rf /var/www/api/*
            sudo mkdir -p /var/www/api
            sudo chown ec2-user:ec2-user /var/www/api
            
            # 수동으로 옮긴 unzip 사용
            /home/ec2-user/unzip -o -q /home/ec2-user/deploy_package.zip -d /var/www/api/
            
            cd /var/www/api &&
            node /home/ec2-user/pm2-bundle/bin/pm2 delete api-server || true &&
            
            # 파일 확인 후 서버 기동
            if [ -f /var/www/api/dist/main.js ]; then
              echo '✅ main.js found! Starting server...';
              node /home/ec2-user/pm2-bundle/bin/pm2 start /var/www/api/dist/main.js --name 'api-server'
            else
              echo '❌ Error: main.js not found!';
              ls -R /var/www/api;
              exit 1;
            fi
            
            rm /home/ec2-user/deploy_package.zip
          "
          rm -f api-key.pem deploy_package.zip
