name: Backend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted # 방금 만든 Bastion 러너 사용
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Node.js 환경 세팅
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # pnpm 설치 및 경로 설정
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: false
      - name: Build and Sync to API Server
        run: |
          # 1. Bastion(러너)에서 빌드 및 프로덕션 의존성 설치
          pnpm install
          pnpm run build
          # 배포 효율을 위해 프로덕션용 모듈만 남기거나, 전체를 보낼 준비를 합니다.

          # 2. 파일 전송 (dist 폴더, package.json, node_modules 포함)
          echo "${{ secrets.BASTION_SSH_KEY }}" > api-key.pem
          chmod 400 api-key.pem

          # node_modules까지 같이 보내면 API 서버에서 따로 설치할 필요가 없어 인터넷이 안 돼도 됩니다!
          rsync -avz -e "ssh -i api-key.pem -o StrictHostKeyChecking=no" \
            --exclude '.git' --exclude '.github' \
            ./dist ./package.json ./node_modules \
            ec2-user@10.0.136.140:/var/www/api/

          # 3. API 서버에서 PM2 실행 (경로 문제 해결을 위해 전역 경로 사용 또는 alias 무시)
          ssh -i api-key.pem -o StrictHostKeyChecking=no ec2-user@10.0.136.140 "
            cd /var/www/api &&
            # pm2 경로를 직접 지정하거나, 환경변수를 강제로 로드합니다.
            export PATH=\$PATH:/usr/local/bin:/home/ec2-user/.local/share/pnpm:/home/ec2-user/.npm-global/bin &&
            pm2 reload api-server || pm2 start dist/main.js --name 'api-server'
          "

          rm -f api-key.pem
