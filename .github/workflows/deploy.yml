name: Backend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted # 방금 만든 Bastion 러너 사용
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Node.js 환경 세팅
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # pnpm 설치 및 경로 설정
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: false
      - name: Build and Sync to API Server
        run: |
          # 1. SSH 키 준비
          echo "${{ secrets.BASTION_SSH_KEY }}" > api-key.pem
          chmod 400 api-key.pem

          # 2. 빌드 및 파일 전송 (dist, node_modules 등)
          pnpm install && pnpm run build
          rsync -avz -e "ssh -i api-key.pem -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            ./dist ./package.json ./node_modules \
            ec2-user@10.0.136.140:/var/www/api/

          # 3. API 서버에서 번들링된 PM2로 서버 재시작
          ssh -i api-key.pem -o StrictHostKeyChecking=no ec2-user@10.0.136.140 "
            cd /var/www/api &&
            node /home/ec2-user/pm2-bundle/bin/pm2 reload api-server || \
            node /home/ec2-user/pm2-bundle/bin/pm2 start dist/main.js --name 'api-server'
          "

          rm -f api-key.pem
