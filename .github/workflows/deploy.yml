name: Backend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted # 방금 만든 Bastion 러너 사용
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Node.js 환경 세팅
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # pnpm 설치 및 경로 설정
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: false
      - name: Build and Sync to API Server
        run: |
          # 1. Bastion(러너)에서 빌드 수행
          pnpm install
          pnpm run build

          # 2. 빌드된 결과물만 API 서버로 전송 (rsync 사용)
          echo "${{ secrets.BASTION_SSH_KEY }}" > api-key.pem
          chmod 400 api-key.pem

          # dist 폴더와 package.json 등 실행에 필요한 파일만 전송
          rsync -avz -e "ssh -i api-key.pem -o StrictHostKeyChecking=no" \
            ./dist ./package.json ./pnpm-lock.yaml \
            ec2-user@10.0.136.140:/var/www/api/

          # 3. API 서버에서 프로세스 재시작 명령만 실행
          ssh -i api-key.pem -o StrictHostKeyChecking=no ec2-user@10.0.136.140 "
            cd /var/www/api && pnpm install --prod && pm2 restart all || pm2 start dist/main.js --name 'api-server'
          "
          rm -f api-key.pem
