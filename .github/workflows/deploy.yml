name: Backend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted # 방금 만든 Bastion 러너 사용
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Node.js 환경 세팅
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # pnpm 설치 및 경로 설정
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: false
      - name: Build and Sync to API Server
        run: |
          echo "${{ secrets.BASTION_SSH_KEY }}" > api-key.pem
          chmod 400 api-key.pem

          # 1. 빌드 수행 (에러를 유발하는 approve-builds 제거, 무시 옵션 활성화)
          pnpm config set ignore-scripts false
          pnpm install --no-frozen-lockfile
          pnpm run build

          # 2. tar를 이용한 압축 (리눅스 표준, 폴더 구조 유지에 가장 탁월함)
          tar -czf deploy_package.tar.gz dist package.json node_modules

          # 3. 전송
          scp -i api-key.pem -o StrictHostKeyChecking=no deploy_package.tar.gz ec2-user@10.0.136.140:/home/ec2-user/

          # 4. API 서버에서 압축 해제 및 실행
          ssh -i api-key.pem -o StrictHostKeyChecking=no ec2-user@10.0.136.140 "
            sudo rm -rf /var/www/api/*
            sudo mkdir -p /var/www/api
            sudo chown ec2-user:ec2-user /var/www/api
            
            # 내장된 tar 명령어로 압축 해제 (-C 옵션으로 /var/www/api 경로에 바로 풉니다)
            tar -xzf /home/ec2-user/deploy_package.tar.gz -C /var/www/api/
            
            cd /var/www/api &&
            node /home/ec2-user/pm2-bundle/bin/pm2 delete api-server || true &&
            
            # 파일 확인 및 기동
            if [ -f /var/www/api/dist/main.js ]; then
              echo '✅ main.js found! Starting server...';
              node /home/ec2-user/pm2-bundle/bin/pm2 start /var/www/api/dist/main.js --name 'api-server'
            else
              echo '❌ Error: main.js not found!';
              exit 1;
            fi
            
            rm /home/ec2-user/deploy_package.tar.gz
          "
          rm -f api-key.pem deploy_package.tar.gz
