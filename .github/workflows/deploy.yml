name: Backend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted # 방금 만든 Bastion 러너 사용
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy to API Server
        run: |
          # 1. Secret에서 키를 가져와 임시 pem 파일 생성 및 권한 설정
          echo "${{ secrets.BASTION_SSH_KEY }}" > ./api-key.pem
          chmod 600 ./api-key.pem

          # 2. SSH 접속 및 명령어 실행
          ssh -o StrictHostKeyChecking=no -i ./api-key.pem ec2-user@10.0.136.140 "cd /var/www/api && git pull origin main && pnpm install && pnpm run build && (pm2 restart api-server || pm2 start dist/main.js --name 'api-server')"

          # 3. 보안을 위해 임시 pem 파일 삭제
          rm -f ./api-key.pem
